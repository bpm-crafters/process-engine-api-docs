# ###############################
# Main config file for MkDocs.
# ###############################
#
# To run:
# mkdocs serve
# More help: https://www.holunda.io/camunda-bpm-taskpool/developer-guide/project-setup.html#build-documentation
# ###############################

site_name: Process Engine API
site_url: https://bpm-crafters.dev/process-engine-api-docs/
site_author: BPM Crafters
site_description: >-
 Process Engine API is an open-source framework for building process applications with
 following BPM Manifest. It provides an engine-agnostic API to de-couple the business
 and application logic from technology of the process engine implementation.

copyright: Copyright &copy; 2024 - 2025, BPM Crafters

use_directory_urls: false

# Repository
repo_name: bpm-crafters/process-engine-api
repo_url: https://github.com/bpm-crafters/process-engine-api-docs/
edit_uri: edit/develop/docs/

markdown_extensions:
    - attr_list
    - toc:
        permalink: "#"
    - pymdownx.highlight
    - pymdownx.superfences
    - pymdownx.details
    - admonition


theme:
  name: material
  features:
    - navigation.instant # When instant loading is enabled, clicks on all internal links will be intercepted and dispatched via XHR without fully reloading the page
    - navigation.tabs # add top level nav items into a horizoneal menu
    - navigation.tabs.sticky # make horizontal menu sticky (insider feature)
    - navigation.sections
    - navigation.top # add "navigate to top" page icon on bottom left
    - toc.integrate # integrate site TOC into the menu on the left
  logo: assets/img/logo.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css: [stylesheets/extra.css]

extra:
  social:
#    - icon: fontawesome/brands/twitter
#      name: Holisticon on Twitter
#      link: https://twitter.com/holisticon
    - icon: fontawesome/brands/github
      name: BPM Crafters
      link: https://github.com/bpm-crafters/
  version:
    provider: mike

plugins:
  - search
  - mike:
      # these fields are all optional; the defaults are as below...
      version_selector: true   # set to false to leave out the version selector
      css_dir: css                    # the directory to put the version selector's CSS
      javascript_dir: js            # the directory to put the version selector's JS
      canonical_version: null  # the version for <link rel="canonical">; `null`
                                            # uses the version specified via `mike deploy`
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true
  - multirepo:
      cleanup: false
      keep_docs_dir: false
      nav_repos:
        - name: process-engine-api
          import_url: https://github.com/bpm-crafters/process-engine-api?edit_uri=/blob/develop/&branch=develop
          imports: [ docs/**/*.md, docs/assets/img/* ]
        - name: process-engine-worker
          import_url: https://github.com/bpm-crafters/process-engine-worker?edit_uri=/blob/develop/&branch=develop
          imports: [ docs/**/*.md ]
        - name: process-engine-adapters-camunda-7
          import_url: https://github.com/bpm-crafters/process-engine-adapters-camunda-7?edit_uri=/blob/develop/&branch=develop
          imports: [ docs/**/*.md ]
        - name: process-engine-adapters-camunda-8
          import_url: https://github.com/bpm-crafters/process-engine-adapters-camunda-8?edit_uri=/blob/develop/&branch=develop
          imports: [ docs/**/*.md ]

nav:
  - Home: index.md
  - Introduction:
    - Motivation and Goal: introduction/index.md
    - Clean Architecture: introduction/clean-architecture.md
  - Quick Start:
    - Basic Setup: getting-started/index.md
    - Camunda 7 Embedded: process-engine-adapters-camunda-7/docs/quickstart-c7-embedded.md
    - Camunda 7 Remote: process-engine-adapters-camunda-7/docs/quickstart-c7-remote.md
    - Camunda 8 SaaS: process-engine-adapters-camunda-8/docs/quickstart-c8-saas.md
  - Reference:
    - Overview: reference-guide/index.md
    - Deployment API: process-engine-api/docs/deployment-api.md
    - Process API: process-engine-api/docs/process-api.md
    - Correlation API: process-engine-api/docs/correlation-api.md
    - Signal API: process-engine-api/docs/signal-api.md
    - Task Subscription API: process-engine-api/docs/task-subscription-api.md
    - Service Task Completion API: process-engine-api/docs/service-task-completion-api.md
    - User Task Completion API: process-engine-api/docs/user-task-completion-api.md
    - User Task Support: process-engine-api/docs/user-task-support.md
    - Process Engine Worker: process-engine-worker/docs/process-engine-worker.md
  - Developers:
    - Contribution: developer-guide/contribution.md
    - Project Setup: developer-guide/project-setup.md
